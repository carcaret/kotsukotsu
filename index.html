<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>コツコツ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>コツコツ</h1>
      <div class="header-actions">
        <button id="btn-sync" class="sync-btn" title="Estado de sincronización" hidden>
          <span id="sync-icon" class="sync-icon"></span>
        </button>
        <button id="btn-settings" class="icon-btn" title="Ajustes" aria-label="Ajustes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <div id="settings-panel" hidden>
      <div class="settings-card">
        <h2 class="settings-title">Sincronización GitHub</h2>
        <p class="settings-desc">Token con permiso <code>contents:write</code> en el repo.</p>
        <form id="settings-form">
          <div class="input-group">
            <label for="input-token">Personal Access Token</label>
            <input type="password" id="input-token" placeholder="ghp_…" autocomplete="off">
          </div>
          <div class="input-group">
            <label for="input-repo">Repositorio</label>
            <input type="text" id="input-repo" placeholder="usuario/repo" value="carcaret/kotsukotsu">
          </div>
          <div class="settings-actions">
            <button type="submit" class="btn-primary">Guardar</button>
            <button type="button" id="btn-clear-config" class="btn-secondary">Borrar config</button>
          </div>
        </form>
        <p id="settings-status" class="settings-status"></p>
        <p class="settings-version">v1.0.0</p>
      </div>
    </div>

    <main>
      <section id="state-card" class="card"></section>

      <button id="btn-register" class="btn-primary">+ Registrar sesión hoy</button>

      <div id="form-container" hidden></div>

      <section id="history-section">
        <h3 class="section-title">Historial reciente</h3>
        <ul id="history-list" class="history-list"></ul>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
